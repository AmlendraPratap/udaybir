<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motor Insurance</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f3f7f5;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    color:#075e54;
    margin-bottom:20px;
}

p{
    margin-bottom:20px;
    line-height:1.6;
}

.form-group{
    margin-bottom:18px;
}

label{
    font-weight:bold;
    display:block;
    margin-bottom:8px;
}

input[type="text"],
input[type="tel"],
input[type="email"],
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

textarea{
    resize:vertical;
}

button{
    width:100%;
    background:#25D366;
    color:#fff;
    border:none;
    padding:15px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1ebc5b;
}

.note{
    color:#666;
    font-size:14px;
    margin-top:15px;
}
</style>

</head>
<body>

<div class="container">

<h2>Motor Insurance</h2>

<p>
Dear Sir/Madam,<br><br>

To generate your <b>Motor Insurance quotation</b>, kindly share the following documents and details:
</p>

<form id="motorForm">

<div class="form-group">
<label>Your Name *</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>RC (Registration Certificate) Available?</label>
<select id="rc">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="form-group">
<label>Previous Insurance Policy Available?</label>
<select id="policy">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="form-group">
<label>Claim Status</label>
<select id="claim">
<option>NCB (No Claim Bonus)</option>
<option>Claim Taken</option>
<option>New Vehicle</option>
</select>
</div>

<div class="form-group">
<label>Aadhaar Number</label>
<input type="text" id="aadhaar">
</div>

<div class="form-group">
<label>PAN Number</label>
<input type="text" id="pan">
</div>

<div class="form-group">
<label>Mobile Number *</label>
<input type="tel" id="mobile" required>
</div>

<div class="form-group">
<label>Email ID</label>
<input type="email" id="email">
</div>

<div class="form-group">
<label>Additional Remarks</label>
<textarea id="remarks" rows="4"></textarea>
</div>

<button type="button" onclick="sendWhatsApp()">
Send Request on WhatsApp
</button>

</form>

<p class="note">
These details will help us generate an accurate quotation with the best available premium and coverage.
</p>

</div>

<script>

function sendWhatsApp(){

const phone="919810597410";   // Replace with your WhatsApp number

const msg=
`*Motor Insurance Quotation Request*

*Customer Name:* ${document.getElementById("name").value}

*RC Copy Available:* ${document.getElementById("rc").value}

*Previous Insurance Policy:* ${document.getElementById("policy").value}

*Claim Status:* ${document.getElementById("claim").value}

*Aadhaar:* ${document.getElementById("aadhaar").value}

*PAN:* ${document.getElementById("pan").value}

*Mobile:* ${document.getElementById("mobile").value}

*Email:* ${document.getElementById("email").value}

*Remarks:* ${document.getElementById("remarks").value}`;

window.open(
`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,
'_blank'
);

}

</script>

</body>
</html>
