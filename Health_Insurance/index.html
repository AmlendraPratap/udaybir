<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">


<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f7f5;
}
.container{
    max-width:850px;
    margin:30px auto;
    background:#fff;
    padding:30px;
    border-radius:8px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}
h1{
    color:#128c7e;
    text-align:center;
}
p{
    font-size:18px;
    line-height:1.6;
}
.q{
    margin:18px 0;
}
label{
    font-weight:bold;
}
input[type=text]{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:1px solid #ccc;
    border-radius:5px;
}
button{
    background:#128c7e;
    color:#fff;
    border:none;
    padding:14px 25px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}
button:hover{
    background:#0f7469;
}
</style>

</head>

<body>

<div class="container">



<p>
To generate your <b>Health Insurance quotation</b>, kindly share the following
details for each person to be insured:
</p>

<form id="healthForm">

<div class="q">
<label><input type="radio" name="info" id="r1"> Postal Code (PIN Code)</label>
<input type="text" id="a1" placeholder="Enter PIN Code">
</div>

<div class="q">
<label><input type="radio" name="info" id="r2"> Aadhaar Card</label>
<input type="text" id="a2" placeholder="Enter Aadhaar Number">
</div>

<div class="q">
<label><input type="radio" name="info" id="r3"> Full Name (as on PAN/Aadhaar Card)</label>
<input type="text" id="a3" placeholder="Enter Full Name">
</div>

<div class="q">
<label><input type="radio" name="info" id="r4"> Mobile No.</label>
<input type="text" id="a4" placeholder="Enter Mobile Number">
</div>

<div class="q">
<label><input type="radio" name="info" id="r5"> Date of Birth (DD/MM/YYYY)</label>
<input type="text" id="a5" placeholder="DD/MM/YYYY">
</div>

<div class="q">
<label><input type="radio" name="info" id="r6"> Height (in cm/ft & in)</label>
<input type="text" id="a6" placeholder="Example: 170 cm">
</div>

<div class="q">
<label><input type="radio" name="info" id="r7"> Weight (in kg)</label>
<input type="text" id="a7" placeholder="Example: 72 kg">
</div>

<div class="q">
<label><input type="radio" name="info" id="r8"> Pre-Existing Diseases (PED), if any</label>
<input type="text" id="a8" placeholder="Mention Disease(s)">
</div>

<div class="q">
<label><input type="radio" name="info" id="r9"> Once I receive the above details, I will generate and share the most suitable health insurance quotation.</label>
</div>

<br>

<button type="submit">Submit on WhatsApp</button>

</form>

</div>

<script>

document.getElementById("healthForm").onsubmit=function(e){

e.preventDefault();

let msg="Health Insurance Quotation Request\n\n";

const questions=[
"Postal Code (PIN Code)",
"Aadhaar Card",
"Full Name (as on PAN/Aadhaar Card)",
"Mobile No.",
"Date of Birth (DD/MM/YYYY)",
"Height (in cm/ft & in)",
"Weight (in kg)",
"Pre-Existing Diseases (PED), if any)",
"Once I receive the above details, I will generate and share the most suitable health insurance quotation."
];

for(let i=1;i<=9;i++){

let checked=document.getElementById("r"+i).checked;

msg+=(checked?"_ ":"_ ")+questions[i-1];

if(i<9){
msg+="\nAnswer: "+document.getElementById("a"+i).value;
}

msg+="\n\n";

}

window.open(
"https://wa.me/919810597410?text="+encodeURIComponent(msg),
"_blank"
);

};

</script>

</body>
</html>
