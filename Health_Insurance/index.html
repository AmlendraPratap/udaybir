<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Health Insurance</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f7f5;
}
.container{
    max-width:850px;
    margin:30px auto;
    background:#fff;
    padding:30px;
    border-radius:8px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}
h1{
    color:#128c7e;
    text-align:center;
}
p{
    font-size:18px;
    line-height:1.6;
}
.q{
    margin:18px 0;
}
label{
    font-weight:bold;
    display:block;
    margin-bottom:8px;
}
input[type=text]{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}
button{
    background:#128c7e;
    color:#fff;
    border:none;
    padding:14px 25px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}
button:hover{
    background:#0f7469;
}
</style>

</head>

<body>

<div class="container">

<h1>Health Insurance</h1>

<p>
To generate your <b>Health Insurance quotation</b>, kindly share the following
details for the person(s) to be insured:
</p>

<form id="healthForm">

<div class="q">
<label>Postal Code (PIN Code)</label>
<input type="text" id="a1" placeholder="Enter PIN Code">
</div>

<div class="q">
<label>Aadhaar Card</label>
<input type="text" id="a2" placeholder="Enter Aadhaar Number">
</div>

<div class="q">
<label>Full Name (as on PAN/Aadhaar Card)</label>
<input type="text" id="a3" placeholder="Enter Full Name">
</div>

<div class="q">
<label>Mobile No.</label>
<input type="text" id="a4" placeholder="Enter Mobile Number">
</div>

<div class="q">
<label>Date of Birth (DD/MM/YYYY)</label>
<input type="text" id="a5" placeholder="DD/MM/YYYY">
</div>

<div class="q">
<label>Height (in cm/ft & in)</label>
<input type="text" id="a6" placeholder="Example: 170 cm">
</div>

<div class="q">
<label>Weight (in kg)</label>
<input type="text" id="a7" placeholder="Example: 72 kg">
</div>

<div class="q">
<label>Pre-Existing Diseases (PED), if any</label>
<input type="text" id="a8" placeholder="Mention Disease(s)">
</div>

<br>

<button type="submit">Submit on WhatsApp</button>

</form>

</div>

<script>

document.getElementById("healthForm").onsubmit = function(e){

e.preventDefault();

let msg =
"*Health Insurance*\n\n" +
"To generate your *health insurance quotation*, kindly share the following details for the person(s) to be insured.\n\n";

const questions = [
"Postal Code (PIN Code)",
"Aadhaar Card",
"Full Name (as on PAN/Aadhaar Card)",
"Mobile No.",
"Date of Birth (DD/MM/YYYY)",
"Height (in cm/ft & in)",
"Weight (in kg)",
"Pre-Existing Diseases (PED), if any"
];

for(let i=1;i<=8;i++){

msg += questions[i-1] + "\n";
msg += "Answer: " + document.getElementById("a"+i).value + "\n\n";

}

window.open(
"https://wa.me/917906116046?text=" + encodeURIComponent(msg),
"_blank"
);

};

</script>

</body>
</html>
